name: Data source proposal
description: Evaluate a new source without assuming usage or publication rights.
title: "[Source] "
labels: ["data-source-review"]
body:
  - type: markdown
    attributes:
      value: |
        MarketWitness does not activate a real-data source until its Evidence Passport documents provenance, cost, cadence, claim boundary, and public-output rights.
  - type: input
    id: provider
    attributes:
      label: Provider and product
      placeholder: SEC EDGAR, Ondo Global Markets, authorized target-price provider...
    validations:
      required: true
  - type: input
    id: official_url
    attributes:
      label: Official data or documentation URL
      placeholder: https://...
    validations:
      required: true
  - type: input
    id: terms_url
    attributes:
      label: Terms, license, or access-rules URL
      placeholder: https://...
    validations:
      required: true
  - type: dropdown
    id: data_class
    attributes:
      label: Data class
      options:
        - Analyst targets / ratings
        - Adjusted prices
        - IPO filings / listings
        - ETF holdings
        - Tokenized equities / RWA
        - News or market context
        - Other
    validations:
      required: true
  - type: textarea
    id: coverage
    attributes:
      label: Coverage, fields, and frequency
      description: Describe the universe, available history, fields, and technical limits.
    validations:
      required: true
  - type: dropdown
    id: cost
    attributes:
      label: Known cost
      options:
        - Free without key
        - Free with key or registration
        - Freemium with limits
        - Paid
        - Unknown
    validations:
      required: true
  - type: textarea
    id: rights
    attributes:
      label: Collection and publication rights
      description: Cite or summarize the rule that permits or limits automation, storage, display, and derived output.
    validations:
      required: true
  - type: textarea
    id: claim_boundary
    attributes:
      label: Confirmation rule and claim boundary
      description: State what fact the source can support and what must NOT be claimed from this evidence alone.
      placeholder: A published prospectus opens a review; it does not confirm admission or first trading.
    validations:
      required: true
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Confirmations
      options:
        - label: I am not attaching credentials or private data to this issue.
          required: true
        - label: I understand that a public URL does not equal republication permission.
          required: true
        - label: I accept that a passport may be published before a connector is implemented.
          required: true
