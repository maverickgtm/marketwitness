name: Bug report
description: Report a reproducible issue without including secrets or licensed data.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        For vulnerabilities or data exposure, use the private channel described in SECURITY.md.
  - type: textarea
    id: problem
    attributes:
      label: What happened
      description: Include the expected and observed outcome.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: Commands, dashboard route, or synthetic fixture used.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
      placeholder: v0.1.0 or commit hash
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output without secrets
      render: shell
  - type: checkboxes
    id: hygiene
    attributes:
      label: Data protection
      options:
        - label: I removed API keys, personal email addresses, and non-redistributable data from this report.
          required: true
