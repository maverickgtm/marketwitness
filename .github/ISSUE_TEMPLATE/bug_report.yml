name: Reporte de error
description: Informar un fallo reproducible sin incluir secretos o datos licenciados.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Para vulnerabilidades o fugas de datos, usa el canal privado descrito en SECURITY.md.
  - type: textarea
    id: problem
    attributes:
      label: Que ocurrio
      description: Incluye el resultado esperado y el observado.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Pasos para reproducir
      placeholder: Comandos, ruta del dashboard o fixture sintetico usado.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit o version
      placeholder: v0.1.0 o hash de commit
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Salida relevante sin secretos
      render: shell
  - type: checkboxes
    id: hygiene
    attributes:
      label: Proteccion de datos
      options:
        - label: Retire claves API, correos personales y datos no redistribuibles del reporte.
          required: true

