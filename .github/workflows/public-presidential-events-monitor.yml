name: Public Presidential Events Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "43 12 * * 1-5"

permissions:
  contents: read

jobs:
  official-white-house-intake:
    name: Official White House RSS intake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install application dependencies
        run: python -m pip install ".[application]"
      - name: Define UTC observation date
        run: |
          echo "AS_OF=$(date -u +%F)" >> "$GITHUB_ENV"
          mkdir -p build/policy-monitor/history
      - name: Restore retained official-event archive
        uses: actions/cache/restore@v4
        with:
          path: |
            build/policy-monitor/history
            build/policy-monitor/sec-insider-activity.csv
            build/policy-monitor/sec-insider-activity.md
            build/policy-monitor/sec-insider-activity.html
          key: public-presidential-events-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            public-presidential-events-${{ github.ref_name }}-
      - name: Collect and classify official event metadata
        run: |
          python -m marketwitness whitehouse-events \
            --archive build/policy-monitor/history/whitehouse-events.csv \
            --output build/policy-monitor/whitehouse-events.csv \
            --report build/policy-monitor/whitehouse-events.md \
            --html build/policy-monitor/whitehouse-events.html \
            --as-of "$AS_OF"
      - name: Collect official Treasury yield context
        run: |
          python -m marketwitness treasury-yields \
            --year "$(date -u +%Y)" \
            --output build/policy-monitor/treasury-yields.csv \
            --report build/policy-monitor/treasury-yields.md \
            --html build/policy-monitor/treasury-yields.html \
            --as-of "$AS_OF"
      - name: Collect official macro catalyst schedule
        env:
          MARKETWITNESS_MACRO_USER_AGENT: ${{ secrets.MARKETWITNESS_MACRO_USER_AGENT }}
        run: |
          python -m marketwitness macro-calendar \
            --year "$(date -u +%Y)" \
            --output build/policy-monitor/macro-calendar.csv \
            --report build/policy-monitor/macro-calendar.md \
            --html build/policy-monitor/macro-calendar.html \
            --as-of "$AS_OF"
      - name: Collect official CFTC positioning context
        run: |
          python -m marketwitness cftc-positioning \
            --output build/policy-monitor/cftc-positioning.csv \
            --report build/policy-monitor/cftc-positioning.md \
            --html build/policy-monitor/cftc-positioning.html \
            --as-of "$AS_OF"
      - name: Collect official SEC insider activity classifications
        if: github.event_name == 'workflow_dispatch' || hashFiles('build/policy-monitor/sec-insider-activity.csv') == ''
        env:
          MARKETWITNESS_SEC_USER_AGENT: ${{ secrets.MARKETWITNESS_SEC_USER_AGENT }}
        run: |
          python -m marketwitness sec-insider-activity \
            --output build/policy-monitor/sec-insider-activity.csv \
            --report build/policy-monitor/sec-insider-activity.md \
            --html build/policy-monitor/sec-insider-activity.html \
            --as-of "$AS_OF"
      - name: Save retained official-event archive
        uses: actions/cache/save@v4
        with:
          path: |
            build/policy-monitor/history
            build/policy-monitor/sec-insider-activity.csv
            build/policy-monitor/sec-insider-activity.md
            build/policy-monitor/sec-insider-activity.html
          key: public-presidential-events-${{ github.ref_name }}-${{ github.run_id }}
      - name: Describe public-event boundary
        run: |
          {
            echo "## MarketWitness Official Presidential Event Intake"
            echo ""
            echo "- Observation date: \`$AS_OF\`."
            echo "- Collects title, timestamp, official URL and rule-based topic tags from White House News and Presidential Actions RSS only."
            echo "- Includes official Treasury daily 2Y and 10Y yield context for session-to-session comparison."
            echo "- Includes scheduled Federal Reserve FOMC meetings and selected BLS CPI, PPI, payrolls and JOLTS releases."
            echo "- Includes delayed weekly CFTC COT positioning for WTI, Gold and U.S. Dollar Index benchmark contracts."
            echo "- Includes quarterly SEC Form 3/4/5 non-derivative P/S classification; P/S codes may include private transactions."
            echo "- Official BLS/FOMC collection uses an identified contact User-Agent configured as a repository secret."
            echo "- Official SEC collection uses an identified contact User-Agent configured as a repository secret."
            echo "- Does not collect Truth Social or White House Wire linked article bodies."
            echo "- Treasury changes are temporal context, not proof of event causation or investment advice."
            echo "- Macro calendar times identify known catalysts; they do not predict outcomes or positions."
            echo "- CFTC category net positions are aggregated context, not trading recommendations."
            echo "- SEC insider classifications require review of the original filing and are not trading recommendations."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload official-event artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketwitness-presidential-events-${{ github.run_number }}
          path: build/policy-monitor/
          if-no-files-found: error
          retention-days: 30
